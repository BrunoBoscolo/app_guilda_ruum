    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling, canvas will handle drag */
            background-color: #0F0C0C;
            background-image: radial-gradient(circle at 50% 30%, #2a0a0a 0%, #0f0c0c 70%);
            touch-action: none;
        }

        #viewport {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        #tree-container {
            position: absolute;
            transform-origin: 0 0;
        }

        .node-base {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e1b18 0%, #13110f 100%);
            border: 3px solid #3d352c;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            transform: translate(-50%, -50%); /* Center on coordinates */
            z-index: 20;
        }

        .node-base:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .node-acquired {
            border-color: #D4AF37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .node-available {
            border-color: #8B1E1E;
        }

        .node-locked {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .node-icon {
            font-size: 32px;
            color: #D4AF37;
        }

        .node-locked .node-icon {
            color: #555;
        }

        /* Bottom Sheet */
        #bottom-sheet {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, #0F0C0C 80%, #1A1A1D 100%);
            border-top: 2px solid #D4AF37;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            transition: bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            max-height: 80vh;
            overflow-y: auto;
        }

        #bottom-sheet.open {
            bottom: 0;
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background-color: #D4AF37;
            border-radius: 2px;
            margin: 12px auto;
            opacity: 0.5;
        }

        /* Fixed Headers & Nav */
        #back-btn {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 50;
            background: rgba(0,0,0,0.5);
            border: 1px solid #D4AF37;
            color: #D4AF37;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

    <script type="module">
        import * as THREE from 'three';

        const guildFunds = parseFloat("{{ guild.funds|stringformat:'f' }}");
        const guildId = {{ guild.id }};
        const csrfToken = "{{ csrf_token }}";

        let buildings = JSON.parse(document.getElementById('buildings-data').textContent);
        let upgrades = JSON.parse(document.getElementById('upgrades-data').textContent);

        const treeContainer = document.getElementById('tree-container');
        const nodesContainer = document.getElementById('nodes-container');
        const viewport = document.getElementById('viewport');
        const bottomSheet = document.getElementById('bottom-sheet');
        const closeBtn = document.getElementById('close-sheet');
        const actionBtn = document.getElementById('action-btn');
        const canvas = document.getElementById('three-canvas');

        let isDragging = false;
        let startX, startY;
        let translateX = 0, translateY = 0;
        let scale = 1;

        // Tree rendering logic
        let nodes = {}; // id -> node data (merged buildings and upgrades)
        let rootNodes = []; // Base buildings

        // Constants
        const NODE_SIZE = 80;
        const X_SPACING = 150;
        const Y_SPACING = -150; // Negative because Y goes down in DOM, we want tree to go up
        const START_Y = window.innerHeight * 0.8; // Start near bottom

        // Three.js Setup
        const scene = new THREE.Scene();
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // Use OrthographicCamera to perfectly map to 2D DOM coordinates
        const camera = new THREE.OrthographicCamera(
            0, window.innerWidth, // left, right
            0, window.innerHeight, // top, bottom
            0.1, 1000
        );
        camera.position.z = 100;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(0, 0, 10);
        scene.add(dirLight);

        let chainMeshes = [];

        function initTree() {
            // Process data
            buildings.forEach(b => {
                nodes[`b_${b.id}`] = { ...b, type: 'building', children: [], x: 0, y: 0 };
                rootNodes.push(`b_${b.id}`);
            });

            upgrades.forEach(u => {
                nodes[`u_${u.id}`] = { ...u, type: 'upgrade', children: [], x: 0, y: 0 };
            });

            // Build hierarchy
            upgrades.forEach(u => {
                const nodeKey = `u_${u.id}`;
                if (u.required_building_id) {
                    const parentKey = `b_${u.required_building_id}`;
                    if (nodes[parentKey]) nodes[parentKey].children.push(nodeKey);
                } else if (u.required_upgrade_id) {
                    const parentKey = `u_${u.required_upgrade_id}`;
                    if (nodes[parentKey]) nodes[parentKey].children.push(nodeKey);
                }
            });

            // Calculate positions
            let currentX = window.innerWidth / 2 - (rootNodes.length * X_SPACING) / 2 + (X_SPACING/2);

            rootNodes.forEach(rootId => {
                positionNode(rootId, currentX, START_Y, 1);
                currentX += X_SPACING * 2; // Extra space between trees
            });

            renderNodes();
            renderLines();

            // Center view
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function positionNode(nodeId, x, y, level) {
            const node = nodes[nodeId];
            node.x = x;
            node.y = y;

            if (!node.children || node.children.length === 0) return;

            const totalWidth = (node.children.length - 1) * X_SPACING;
            let startX = x - totalWidth / 2;

            node.children.forEach(childId => {
                positionNode(childId, startX, y + Y_SPACING, level + 1);
                startX += X_SPACING;
            });
        }

        function isNodeUnlocked(nodeId) {
            const node = nodes[nodeId];
            if (node.type === 'building') return true; // Base buildings always available to view

            if (node.required_building_id) {
                 return nodes[`b_${node.required_building_id}`].acquired;
            } else if (node.required_upgrade_id) {
                 return nodes[`u_${node.required_upgrade_id}`].acquired;
            }
            return false;
        }

        function renderNodes() {
            nodesContainer.innerHTML = '';

            Object.keys(nodes).forEach(id => {
                const node = nodes[id];
                const el = document.createElement('div');
                el.className = 'node-base';

                // Determine state class
                if (node.acquired) {
                    el.classList.add('node-acquired');
                } else if (isNodeUnlocked(id)) {
                    el.classList.add('node-available');
                } else {
                    el.classList.add('node-locked');
                }

                el.style.left = `${node.x}px`;
                el.style.top = `${node.y}px`;
                el.dataset.id = id;

                // Icon
                const icon = document.createElement('span');
                icon.className = 'material-icons-round node-icon';
                icon.innerText = node.icon || (node.type === 'building' ? 'domain' : 'star');
                el.appendChild(icon);

                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!isDragging) showDetails(id);
                });

                nodesContainer.appendChild(el);
            });
        }

        function renderLines() {
            // Clear existing chain meshes
            chainMeshes.forEach(mesh => scene.remove(mesh.mesh));
            chainMeshes = [];

            const chainLinkGeo = new THREE.TorusGeometry(5, 1.5, 8, 16);
            // Deform horizontally to mimic a U-shaped chain link
            chainLinkGeo.scale(1, 1.5, 1);

            // Materials for different states
            const matLocked = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const matAvailable = new THREE.MeshStandardMaterial({
                color: 0x8B1E1E,
                emissive: 0x8B1E1E,
                emissiveIntensity: 0.5
            });
            const matAcquired = new THREE.MeshStandardMaterial({
                color: 0xD4AF37,
                emissive: 0xD4AF37,
                emissiveIntensity: 0.8
            });

            Object.keys(nodes).forEach(parentId => {
                const parent = nodes[parentId];
                if (!parent.children) return;

                parent.children.forEach(childId => {
                    const child = nodes[childId];

                    const startX = parent.x;
                    const startY = parent.y;
                    const endX = child.x;
                    const endY = child.y;

                    const cp1Y = startY + (endY - startY) / 2;
                    const cp2Y = startY + (endY - startY) / 2;

                    let material = matLocked;
                    let state = 'locked';
                    if (child.acquired) {
                        material = matAcquired;
                        state = 'acquired';
                    } else if (parent.acquired) {
                        material = matAvailable;
                        state = 'available';
                    }

                    // For the 3D scene, Y goes UP. But in our DOM, Y goes DOWN.
                    // We can just flip the Y coordinates when mapping to 3D.
                    // Actually, OrthographicCamera maps properly if we just draw them where they are.
                    // Wait, in OrthographicCamera with top=0, bottom=h, Y increases downwards!
                    // So we can use the same coordinates.
                    const curve = new THREE.CubicBezierCurve3(
                        new THREE.Vector3(startX, startY, 0),
                        new THREE.Vector3(startX, cp1Y, 0),
                        new THREE.Vector3(endX, cp2Y, 0),
                        new THREE.Vector3(endX, endY, 0)
                    );

                    const chainLength = curve.getLength();
                    const numLinks = Math.floor(chainLength / 8); // Spacing between links

                    const instancedMesh = new THREE.InstancedMesh(chainLinkGeo, material.clone(), numLinks);
                    instancedMesh.userData = { state: state, baseIntensity: material.emissiveIntensity, timeOffset: Math.random() * Math.PI * 2 };

                    const dummy = new THREE.Object3D();
                    const point = new THREE.Vector3();
                    const tangent = new THREE.Vector3();
                    const up = new THREE.Vector3(0, 1, 0);

                    for (let i = 0; i < numLinks; i++) {
                        const t = i / (numLinks - 1);
                        curve.getPoint(t, point);
                        curve.getTangent(t, tangent);

                        dummy.position.copy(point);

                        // Align chain link along the curve
                        dummy.quaternion.setFromUnitVectors(up, tangent);

                        // Rotate alternate links 90 degrees around the tangent axis to interlock them
                        if (i % 2 === 0) {
                            dummy.rotateOnAxis(up, Math.PI / 2);
                        }

                        dummy.updateMatrix();
                        instancedMesh.setMatrixAt(i, dummy.matrix);
                    }

                    instancedMesh.instanceMatrix.needsUpdate = true;
                    scene.add(instancedMesh);

                    // Initialize independent physics links
                    const linkSpacing = chainLength / (numLinks - 1);
                    const slack = 1.1; // 10% slack
                    const restingDistance = linkSpacing * slack;

                    let links = [];
                    for (let i = 0; i < numLinks; i++) {
                        const t = i / (numLinks - 1);
                        curve.getPoint(t, point);
                        // Add a tiny bit of initial sag to help the solver
                        point.y += Math.sin(t * Math.PI) * 10.0;
                        links.push({
                            pos: point.clone(),
                            oldPos: point.clone(),
                            isPinned: (i === 0 || i === numLinks - 1),
                            // Pinned links need to know where they are anchored
                            anchor: point.clone()
                        });
                    }

                    // Save data for animation
                    chainMeshes.push({
                        parentId: parentId,
                        childId: childId,
                        mesh: instancedMesh,
                        links: links,
                        numLinks: numLinks,
                        restingDistance: restingDistance
                    });
                });
            });
        }

        // --- Viewport Interaction ---
        function updateTransform() {
            treeContainer.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;

            // Update camera to match DOM transform
            // The camera's left/right/top/bottom need to be adjusted based on pan and zoom
            // By default left=0, top=0.
            // When we translate by (tx, ty), the top-left of the DOM moves to tx, ty.
            // This means the coordinate 0,0 in the DOM is now at tx,ty on screen.
            // So the camera's left edge should map to -tx / scale.

            const w = window.innerWidth;
            const h = window.innerHeight;

            camera.left = -translateX / scale;
            camera.right = (w - translateX) / scale;
            camera.top = -translateY / scale;
            camera.bottom = (h - translateY) / scale;

            camera.updateProjectionMatrix();
        }

        viewport.addEventListener('pointerdown', (e) => {
            isDragging = true;
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            viewport.style.cursor = 'grabbing';
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            viewport.style.cursor = 'grab';
        });

        viewport.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newScale = Math.min(Math.max(0.5, scale + delta), 2);

            // Zoom to mouse position logic could go here, keeping simple for now
            scale = newScale;
            updateTransform();
        });

        // Window resize
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w, h);
            updateTransform();
        });

        // Animation Loop for pulsing glow and physics swinging
        const clock = new THREE.Clock();

        // Physics state for the camera/DOM movement
        let lastTx = translateX;
        let lastTy = translateY;

        // Global Physics Constants
        const gravity = new THREE.Vector3(0, 600.0, 0); // Downward force (Y is down in DOM)
        const friction = 0.98; // Air resistance / damping
        const subSteps = 10; // Constraint solver iterations for stability

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            // Cap dt to prevent massive jumps if tab is backgrounded
            const dt = Math.min(clock.getDelta() || 0.016, 0.033);
            const stepDt = dt / subSteps;

            // Calculate pan/drag acceleration
            const deltaTx = translateX - lastTx;
            const deltaTy = translateY - lastTy;
            lastTx = translateX;
            lastTy = translateY;

            // When user pans, the camera moves. We apply a counter-acceleration to the links
            // to make them swing/lag realistically.
            const dragAccel = new THREE.Vector3(-deltaTx * 100.0, -deltaTy * 100.0, 0);

            const totalAccel = new THREE.Vector3().addVectors(gravity, dragAccel);

            const dummy = new THREE.Object3D();
            const up = new THREE.Vector3(0, 1, 0);
            const tangent = new THREE.Vector3();

            chainMeshes.forEach(chainData => {
                const mesh = chainData.mesh;
                const links = chainData.links;
                const numLinks = chainData.numLinks;
                const restDist = chainData.restingDistance;

                // 1. Emissive Pulsing
                if (mesh.material.emissiveIntensity !== undefined) {
                    const state = mesh.userData.state;
                    if (state === 'available' || state === 'acquired') {
                        const speed = state === 'available' ? 4.0 : 2.0;
                        const base = mesh.userData.baseIntensity;
                        mesh.material.emissiveIntensity = base * (Math.sin(time * speed + mesh.userData.timeOffset) * 0.4 + 1.0);
                    }
                }

                // 2. Verlet Integration Step
                for (let i = 0; i < numLinks; i++) {
                    const link = links[i];
                    if (!link.isPinned) {
                        const velocity = new THREE.Vector3().subVectors(link.pos, link.oldPos);
                        velocity.multiplyScalar(friction); // apply damping

                        link.oldPos.copy(link.pos);

                        // pos += velocity + acceleration * dt * dt
                        const accelOffset = new THREE.Vector3().copy(totalAccel).multiplyScalar(dt * dt);
                        link.pos.add(velocity).add(accelOffset);
                    } else {
                        // Keep pinned links exactly at their anchor
                        link.pos.copy(link.anchor);
                        link.oldPos.copy(link.anchor);
                    }
                }

                // 3. Distance Constraint Solver (iterative)
                for (let step = 0; step < subSteps; step++) {
                    for (let i = 0; i < numLinks - 1; i++) {
                        const p1 = links[i];
                        const p2 = links[i + 1];

                        const delta = new THREE.Vector3().subVectors(p2.pos, p1.pos);
                        const dist = delta.length();

                        // Prevent division by zero
                        if (dist > 0.001) {
                            const diff = (dist - restDist) / dist;
                            // Move each point half the distance (unless pinned)
                            const offset = delta.multiplyScalar(0.5 * diff);

                            if (!p1.isPinned) {
                                p1.pos.add(offset);
                            }
                            if (!p2.isPinned) {
                                p2.pos.sub(offset);
                            }
                        }
                    }
                }

                // 4. Update InstancedMesh matrices
                for (let i = 0; i < numLinks; i++) {
                    const link = links[i];

                    // Calculate tangent for rotation
                    if (i < numLinks - 1) {
                        tangent.subVectors(links[i+1].pos, link.pos).normalize();
                    } else if (i > 0) {
                        tangent.subVectors(link.pos, links[i-1].pos).normalize();
                    } else {
                        tangent.set(0, 1, 0); // fallback
                    }

                    dummy.position.copy(link.pos);
                    dummy.quaternion.setFromUnitVectors(up, tangent);

                    // Alternate links rotate 90 degrees to interlock
                    if (i % 2 === 0) {
                        dummy.rotateOnAxis(up, Math.PI / 2);
                    }

                    dummy.updateMatrix();
                    mesh.setMatrixAt(i, dummy.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
            });

            renderer.render(scene, camera);
        }

        // --- Animation Logic ---
        function tween(duration, onUpdate, onComplete) {
            return new Promise(resolve => {
                const startTime = performance.now();
                function step(currentTime) {
                    const elapsed = currentTime - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    // Ease-in-out cubic
                    const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    onUpdate(ease);
                    if (progress < 1) {
                        requestAnimationFrame(step);
                    } else {
                        if (onComplete) onComplete();
                        resolve();
                    }
                }
                requestAnimationFrame(step);
            });
        }

        async function playUpgradeAnimation(childId) {
            // Find parent
            let parentId = null;
            for (const pid in nodes) {
                if (nodes[pid].children && nodes[pid].children.includes(childId)) {
                    parentId = pid;
                    break;
                }
            }
            if (!parentId) return;

            const parent = nodes[parentId];
            const child = nodes[childId];

            // 1. Zoom & Pan
            // Calculate midpoint
            const midX = (parent.x + child.x) / 2;
            const midY = (parent.y + child.y) / 2;

            // Target transform to center the midpoint
            const w = window.innerWidth;
            const h = window.innerHeight;
            const targetScale = 0.8; // Decreased from 1.2 to be less zoomed in
            const targetTx = (w / 2) - (midX * targetScale);
            const targetTy = (h / 2) - (midY * targetScale);

            const startTx = translateX;
            const startTy = translateY;
            const startScale = scale;

            // Disable interaction
            viewport.style.pointerEvents = 'none';

            // Slowed down zoom/pan from 800ms to 1200ms
            await tween(1200, (p) => {
                translateX = startTx + (targetTx - startTx) * p;
                translateY = startTy + (targetTy - startTy) * p;
                scale = startScale + (targetScale - startScale) * p;
                updateTransform();
            });

            // 2. Grey Chain Falls Off
            const oldChainIndex = chainMeshes.findIndex(c => c.parentId === parentId && c.childId === childId);
            if (oldChainIndex !== -1) {
                const oldChain = chainMeshes[oldChainIndex];
                // Unpin all links so it falls
                oldChain.links.forEach(link => {
                    link.isPinned = false;
                });

                // Wait 1.5 seconds for it to start falling, but do not delete it here.
                // We let it continue falling out of the screen indefinitely while the animation proceeds.
                await new Promise(r => setTimeout(r, 1500));
            }

            // 3. Launch Yellow Chain
            // Temporarily set acquired to generate gold chain
            nodes[childId].acquired = true;

            // Call renderLines to create the new chain.
            // Warning: renderLines clears ALL chainMeshes.
            // However, we want the old unpinned chain to continue simulating and falling.
            // So we must temporarily store the old chain, call renderLines, and then add the old chain back.

            let oldChainReference = null;
            if (oldChainIndex !== -1) {
                oldChainReference = chainMeshes[oldChainIndex];
            }

            renderLines();

            // Put the falling chain back in the active array so it keeps getting simulated and rendered
            if (oldChainReference) {
                scene.add(oldChainReference.mesh); // renderLines() might have removed it from the scene
                chainMeshes.push(oldChainReference);
            }

            // Find the new gold chain (the last one added by renderLines, excluding the falling one)
            // It will have the same parent/child ID but we need the newly generated one, which is pinned initially.
            const newChain = chainMeshes.find(c => c.parentId === parentId && c.childId === childId && c !== oldChainReference);
            if (newChain) {
                // Store actual anchors and set everything to parent pos
                const targetAnchors = newChain.links.map(l => l.anchor.clone());
                const parentPos = new THREE.Vector3(parent.x, parent.y, 0);

                newChain.links.forEach((link, i) => {
                    link.pos.copy(parentPos);
                    link.oldPos.copy(parentPos);
                    link.anchor.copy(parentPos);
                });

                // Animate anchors shooting out, slowed down from 600ms to 1000ms
                await tween(1000, (p) => {
                    newChain.links.forEach((link, i) => {
                        // Linear interpolation of anchor
                        link.anchor.lerpVectors(parentPos, targetAnchors[i], p);
                        // Pinning makes the verlet integration pull the chain tightly to the anchor
                        if (link.isPinned) {
                            link.pos.copy(link.anchor);
                            link.oldPos.copy(link.anchor);
                        }
                    });
                });

                // Extra time for chain to settle visually
                await new Promise(r => setTimeout(r, 400));
            }

            // 4. Node Glow
            const childEl = document.querySelector(`.node-base[data-id="${childId}"]`);
            if (childEl) {
                childEl.classList.remove('node-locked', 'node-available');
                childEl.classList.add('node-acquired');

                // Animate glow effect using DOM
                childEl.style.transition = 'transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.6s';
                childEl.style.transform = `translate(-50%, -50%) scale(1.3)`;
                childEl.style.boxShadow = `0 0 40px rgba(212, 175, 55, 0.8), 0 0 80px rgba(212, 175, 55, 0.4)`;

                const icon = childEl.querySelector('.node-icon');
                if (icon) {
                    icon.style.transition = 'color 0.6s, transform 0.6s';
                    icon.style.color = '#FFF';
                    icon.style.transform = 'scale(1.2)';
                }

                // Slowed down glow from 500ms to 1000ms
                await new Promise(r => setTimeout(r, 1000));

                // Settle down
                childEl.style.transform = `translate(-50%, -50%) scale(1)`;
                childEl.style.boxShadow = `0 0 15px rgba(212, 175, 55, 0.4)`;
                if (icon) {
                    icon.style.color = '#D4AF37';
                    icon.style.transform = 'scale(1)';
                }

                // Increased wait from 300ms to 500ms
                await new Promise(r => setTimeout(r, 500));
            }

            // Re-enable interaction
            viewport.style.pointerEvents = 'auto';
        }

        // --- Bottom Sheet Interaction ---
        let selectedNodeId = null;

        function showDetails(id) {
            selectedNodeId = id;
            const node = nodes[id];

            document.getElementById('sheet-title').innerText = node.name;
            document.getElementById('sheet-subtitle').innerText = node.type === 'building' ? 'Sede' : `Upgrade Tier ${node.tier}`;
            document.getElementById('sheet-desc').innerText = node.description;
            document.getElementById('sheet-cost').innerHTML = `<span class="material-icons-round text-sm">savings</span> T$ ${node.cost.toFixed(2)}`;
            document.getElementById('sheet-icon').innerText = node.icon || (node.type === 'building' ? 'domain' : 'star');

            const statusEl = document.getElementById('sheet-status');
            const actionBtn = document.getElementById('action-btn');
            const errorMsg = document.getElementById('error-msg');

            errorMsg.classList.add('hidden');
            actionBtn.style.display = 'flex';

            if (node.acquired) {
                statusEl.innerText = "Adquirido";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border border-green-500 text-green-500";
                actionBtn.style.display = 'none';
            } else if (node.type === 'building') {
                statusEl.innerText = "Construção Base";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border border-gold text-gold";
                actionBtn.style.display = 'none'; // Built from construcoes hub
            } else if (isNodeUnlocked(id)) {
                statusEl.innerText = "Disponível";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border border-gold text-gold";
                actionBtn.innerText = "Adquirir";
                actionBtn.disabled = false;
                actionBtn.className = "bg-primary hover:bg-red-800 text-white font-display font-bold uppercase tracking-widest py-3 px-8 rounded-lg shadow-red-glow transition-all active:scale-95 border border-red-500/50 w-full flex items-center justify-center gap-2";
            } else {
                statusEl.innerText = "Bloqueado";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide border border-gray-500 text-gray-500";
                actionBtn.innerText = "Requisitos não atendidos";
                actionBtn.disabled = true;
                actionBtn.className = "bg-stone-800 text-stone-500 font-display font-bold uppercase tracking-widest py-3 px-8 rounded-lg border border-stone-600 w-full flex items-center justify-center gap-2 cursor-not-allowed";
            }

            bottomSheet.classList.add('open');
        }

        closeBtn.addEventListener('click', () => {
            bottomSheet.classList.remove('open');
        });

        actionBtn.addEventListener('click', async () => {
            if (!selectedNodeId || nodes[selectedNodeId].type === 'building') return;

            const node = nodes[selectedNodeId];

            if (guildFunds < node.cost) {
                const err = document.getElementById('error-msg');
                err.innerText = "Fundos insuficientes!";
                err.classList.remove('hidden');
                return;
            }

            // Purchase Request
            try {
                const response = await fetch(`/api/guilds/${guildId}/purchase_upgrade/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({ upgrade_id: node.id })
                });

                if (response.ok) {
                    bottomSheet.classList.remove('open');
                    await playUpgradeAnimation(selectedNodeId);
                    // Reload to update backend state
                    window.location.reload();
                } else {
                    const data = await response.json();
                    const err = document.getElementById('error-msg');
                    err.innerText = JSON.stringify(data);
                    err.classList.remove('hidden');
                }
            } catch (e) {
                console.error(e);
                const err = document.getElementById('error-msg');
                err.innerText = "Erro na requisição.";
                err.classList.remove('hidden');
            }
        });

        // Initialize
        initTree();
        viewport.style.cursor = 'grab';
        animate();

    </script>
</body>
</html>
